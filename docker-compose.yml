version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campmate_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-campmate}
    ports:
      - "5433:5432"
    volumes:
      # Data persistence
      - pgdata:/var/lib/postgresql/data
      # Schema Auto-Initialization (runs on first launch of an empty volume)
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-campmate}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: campmate_pgdata
